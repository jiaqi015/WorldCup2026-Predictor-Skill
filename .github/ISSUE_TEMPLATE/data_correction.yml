name: Data correction
description: Report a fixture, team, venue, scorer, odds, ranking, or ESPN mapping issue.
title: "[Data]: "
labels: ["data"]
body:
  - type: dropdown
    id: data_area
    attributes:
      label: Data area
      options:
        - Fixture or kickoff time
        - Venue
        - Team or group
        - Knockout placement
        - Player or position
        - Scorer or assist
        - Odds or ranking
        - ESPN mapping
        - Translation
    validations:
      required: true
  - type: input
    id: subject
    attributes:
      label: Fixture, team, or player
      placeholder: "Argentina vs Austria, Scotland, Lionel Messi, etc."
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: What should change?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source link
      description: Use an official or reputable source where possible.
    validations:
      required: true

