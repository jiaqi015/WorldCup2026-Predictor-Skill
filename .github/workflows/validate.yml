name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill, plugin, and predictor
        run: python3 scripts/release_check.py
      - name: Install browser verification runtime
        run: |
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium
      - name: Verify complete browser journeys and storage migrations
        run: python3 scripts/full_system_experience_test.py
      - name: Check whitespace
        run: git diff --check
